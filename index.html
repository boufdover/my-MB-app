<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, sans-serif; }
        .app-card { 
            background: white; 
            border-radius: 20px; 
            padding: 25px; 
            margin-top: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        .form-label { font-weight: 600; color: #555; margin-bottom: 5px; }
        .form-control, .form-select { 
            border-radius: 12px; 
            padding: 12px; 
            border: 1px solid #e0e0e0; 
            background-color: #f9f9f9;
        }
        .form-control:focus { background-color: #fff; box-shadow: 0 0 0 4px rgba(0,123,255,0.1); }
        .btn-submit { 
            background-color: #007bff; 
            border: none; 
            border-radius: 12px; 
            padding: 16px; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: transform 0.1s ease;
        }
        .btn-submit:active { transform: scale(0.98); }
        .success-banner {
            display: none;
            background-color: #d1e7dd;
            color: #0f5132;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="app-card">
                <div id="statusBanner" class="success-banner">Data Recorded! ✅</div>
                <h3 class="mb-4 text-center">New Entry</h3>
                
                <form id="trackerForm">
                    <div class="mb-3">
                        <label class="form-label">Account</label>
                        <select id="account" class="form-select" required>
                            <option value="Jamie">Jamie</option>
                            <option value="Emily">Emily</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Site</label>
                            <input type="text" id="site" class="form-control" placeholder="e.g. SkyBet" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Game</label>
                            <input type="text" id="game" class="form-control" placeholder="e.g. Roulette" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-4 mb-3">
                            <label class="form-label">Stake</label>
                            <input type="number" step="0.01" id="stake" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">Spin Size</label>
                            <input type="number" step="0.01" id="spinSize" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">P/L</label>
                            <input type="number" step="0.01" id="pl" class="form-control" placeholder="+/-" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Comments</label>
                        <textarea id="comments" class="form-control" rows="2" placeholder="Notes..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary btn-submit w-100">
                        Submit to Spreadsheet
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Automatically set the date field to today
    document.getElementById('date').valueAsDate = new Date();

    // 2. PASTE YOUR WEB APP URL FROM GOOGLE APPS SCRIPT HERE
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwUpiEIZ2g4cvj30tndocdO03FT4XsW-q8cQwhWzNkATwwNlhkButBYx6ZepL4cZLQf/exec';

    const form = document.getElementById('trackerForm');
    const btn = document.getElementById('submitBtn');
    const banner = document.getElementById('statusBanner');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Visual feedback
        btn.disabled = true;
        btn.innerText = 'Sending Data...';

        const payload = {
            account: document.getElementById('account').value,
            date: document.getElementById('date').value,
            site: document.getElementById('site').value,
            game: document.getElementById('game').value,
            stake: document.getElementById('stake').value,
            spinSize: document.getElementById('spinSize').value,
            pl: document.getElementById('pl').value,
            comments: document.getElementById('comments').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            body: JSON.stringify(payload)
        })
        .then(() => {
            // Success Routine
            banner.style.display = 'block';
            btn.innerText = 'Submit Again';
            btn.disabled = false;
            form.reset();
            document.getElementById('date').valueAsDate = new Date(); // Re-set date
            
            // Hide banner after 4 seconds
            setTimeout(() => { banner.style.display = 'none'; }, 4000);
        })
        .catch(err => {
            alert('Error saving data: ' + err);
            btn.disabled = false;
            btn.innerText = 'Try Again';
        });
    });
</script>

</body>
</html>
