<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">

    <h2>Vibe App Test</h2>
    <form id="dataForm">
        <p>Name: <br><input type="text" id="name" required></p>
        <p>Message: <br><textarea id="message" required></textarea></p>
        <button type="submit" id="submitBtn">Submit Data</button>
    </form>
    <p id="status" style="color: green; display: none;">Sent successfully!</p>

    <script>
        const WEB_APP_URL = 'YOUR_URL_HERE'; // DOUBLE CHECK THIS IS YOUR ACTUAL URL

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Sending...';

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    message: document.getElementById('message').value
                })
            }).then(() => {
                document.getElementById('status').style.display = 'block';
                btn.innerText = 'Sent!';
            });
        });
    </script>
</body>
</html>
