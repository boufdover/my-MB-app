<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Pro Dark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Dark Mode Vibe */
        body { 
            background-color: #1a1d21; 
            color: #e9ecef;
            font-family: -apple-system, sans-serif; 
        }
        .app-card { 
            background: #2c3036; 
            border-radius: 20px; 
            padding: 25px; 
            margin-top: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            border: 1px solid #3d424a;
        }
        .form-label { font-weight: 600; color: #adb5bd; margin-bottom: 5px; }
        .form-control, .form-select { 
            border-radius: 12px; 
            padding: 12px; 
            border: 1px solid #495057; 
            background-color: #212529;
            color: white;
        }
        .form-control:focus, .form-select:focus { 
            background-color: #212529; 
            color: white;
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.25);
        }
        /* Style for date picker icon color in some browsers */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        .btn-submit { 
            background-color: #0d6efd; 
            border: none; 
            border-radius: 12px; 
            padding: 16px; 
            font-weight: bold; 
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .success-banner {
            display: none;
            background-color: #198754;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="app-card">
                <div id="statusBanner" class="success-banner">Saved to Sheet! ✅</div>
                <h3 class="mb-4 text-center">New Entry</h3>
                
                <form id="trackerForm">
                    <div class="mb-3">
                        <label class="form-label">Account</label>
                        <select id="account" class="form-select" required>
                            <option value="Jamie">Jamie</option>
                            <option value="Emily">Emily</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Site</label>
                            <input type="text" id="site" class="form-control" placeholder="SkyBet" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Game</label>
                            <input type="text" id="game" class="form-control" placeholder="Roulette" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-4 mb-3">
                            <label class="form-label">Stake</label>
                            <input type="number" step="0.01" id="stake" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">Spin Size</label>
                            <input type="number" step="0.01" id="spinSize" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-4 mb-3">
                            <label class="form-label">P/L</label>
                            <input type="number" step="0.01" id="pl" class="form-control" placeholder="+/-" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Comments</label>
                        <textarea id="comments" class="form-control" rows="2" placeholder="Notes..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary btn-submit w-100">
                        Submit Entry
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwUpiEIZ2g4cvj30tndocdO03FT4XsW-q8cQwhWzNkATwwNlhkButBYx6ZepL4cZLQf/exec';

    const form = document.getElementById('trackerForm');
    const btn = document.getElementById('submitBtn');
    const banner = document.getElementById('statusBanner');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Syncing...';

        const payload = {
            account: document.getElementById('account').value,
            date: document.getElementById('date').value,
            site: document.getElementById('site').value,
            game: document.getElementById('game').value,
            stake: document.getElementById('stake').value,
            spinSize: document.getElementById('spinSize').value,
            pl: document.getElementById('pl').value,
            comments: document.getElementById('comments').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            banner.style.display = 'block';
            btn.innerText = 'Submit Another';
            btn.disabled = false;
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            setTimeout(() => { banner.style.display = 'none'; }, 4000);
        });
    });
</script>
</body>
</html>
